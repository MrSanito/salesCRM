version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solo-sales-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/solosales?schema=public
      - NEXTAUTH_SECRET=your_secret_here
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    container_name: solo-sales-db
    ports:
      - "5433:5432" # Changed to 5433 to avoid conflict with local postgres if running
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=solosales
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
