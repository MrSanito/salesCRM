name: Push Metrics
on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch: # Allows manual trigger from GitHub UI for easy testing

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger metrics push
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-metrics-token: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/push-metrics")
          
          echo "Response: $STATUS"
          
          if [ "$STATUS" != "200" ]; then
            echo "❌ Push failed with status $STATUS"
            exit 1
          fi
          
          echo "✅ Metrics pushed successfully"
